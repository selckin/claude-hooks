# Event -> desktop notification mapping (via notify-send).
#
# Format: EVENT=message
#   - EVENT is the Claude Code hook event name (e.g. Notification).
#   - The event fires a desktop notification with that message as the body
#     (the title is always "Claude Code"). Requires notify-send.
#   - Empty value (EVENT=) silences the notification.
#   - Comment a line out (#) to disable it.
#
# Sounds and notifications are independent: an event can have a sound
# (sounds.conf), a notification (here), both, or neither.
#
# All Claude Code hook events (any can notify here):
#   SessionStart, SessionEnd, Setup
#   UserPromptSubmit, Notification, PermissionRequest
#   PreToolUse, PostToolUse, PostToolUseFailure
#   SubagentStart, SubagentStop, Stop
#   TeammateIdle, TaskCompleted, PreCompact

# --- enabled ---

Notification=Claude has a notification
PermissionRequest=Claude needs permission

# --- disabled (uncomment to enable) ---

#Stop=Claude is done
#TaskCompleted=Task completed
#PostToolUseFailure=A tool call failed
