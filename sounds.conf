# Override specific events with a single audio file.
# These take priority over any loaded sound pack.
# Leave value empty or comment out to use pack defaults.
#
# Format: EVENT=/path/to/audio/file
#
# Available events:
#   session_start, session_end, setup
#   user_prompt_submit, notification, permission_request
#   pre_tool_use, post_tool_use, post_tool_use_failure
#   subagent_start, subagent_stop, stop
#   teammate_idle, task_completed, pre_compact
#
# Leave value empty to silence an event:
#   pre_tool_use=

user_prompt_submit=
pre_tool_use=
post_tool_use=
subagent_stop=
pre_compact=
session_start=
post_tool_use_failure=
task_completed=
