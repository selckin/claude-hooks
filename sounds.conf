# Event -> sound mapping for the audio server.
#
# Format: EVENT=file[,file,...]
#   - One of the listed files is picked at random each time the event fires.
#   - Bare filenames resolve against packs/peon/sounds/; absolute paths are
#     used as-is, so you can point at your own files anywhere.
#   - Empty value (EVENT=) silences the event.
#   - Comment a line out (#) to disable the event entirely.
#
# All Claude Code hook events (any can be given a sound here):
#   session_start, session_end, setup
#   user_prompt_submit, notification, permission_request
#   pre_tool_use, post_tool_use, post_tool_use_failure
#   subagent_start, subagent_stop, stop
#   teammate_idle, task_completed, pre_compact

# --- enabled ---

stop=PeonReady1.wav,PeonWhat4.wav,PeonYes1.wav,PeonYes2.wav,PeonYes3.wav,PeonYesAttack1.wav,PeonYesAttack3.wav
notification=PeonWhat4.wav,PeonWhat2.wav,PeonWhat3.wav,PeonWhat1.wav
permission_request=PeonWhat4.wav,PeonWhat2.wav,PeonWhat3.wav,PeonWhat1.wav

