#UserPromptSubmit=PeonYes1.wav,PeonYes2.wav,PeonYes3.wav,PeonYes4.wav,PeonYesAttack1.wav,PeonYesAttack2.wav,PeonYesAttack3.wav
#SubagentStop=PeonReady1.wav,PeonWhat4.wav,PeonYes1.wav,PeonYes2.wav,PeonYes3.wav,PeonYesAttack1.wav,PeonYesAttack3.wav
#TaskCompleted=PeonReady1.wav,PeonWhat4.wav,PeonYes1.wav,PeonYes2.wav,PeonYes3.wav,PeonYesAttack1.wav,PeonYesAttack3.wav
